testing:
  sampling:
    measurements_count: 20
    sampling_frequency_hz: 10
    timeout_seconds: 2

ammeters:
  greenlee:
    port: 5001
    command: "MEASURE_GREENLEE -get_measurement"
    enabled: true

  entes:
    port: 5002
    command: "MEASURE_ENTES -get_data"
    enabled: true

  circutor:
    port: 5003
    command: "MEASURE_CIRCUTOR -get_measurement"
    enabled: true

analysis:
  statistical_metrics:
    - mean
    - median
    - std
    - min
    - max
    - variance

  accuracy:
    enable_comparison: true
    metric: coefficient_of_variation
    threshold: 0.05

  visualization:
    enabled: true
    save_plots: true
    plot_dir: "results/plots"
    plot_types:
      - histogram
      - time_series
      - box_plot

result_management:
  save_results: true
  results_dir: "results/data"

reporting:
  generate_report: true
  report_dir: "results/reports"
